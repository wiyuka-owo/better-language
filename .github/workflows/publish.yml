name: Publish Maven

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-maven
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish artifacts into docs/maven
        run: |
          chmod +x ./gradlew
          ./gradlew publishAllPublicationsToGithubPagesRepository \
            -PbetterlangVersion="${RELEASE_VERSION}" \
            --no-daemon --stacktrace

      - name: Commit and push Maven repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/maven
          if git diff --cached --quiet; then
            echo "No Maven changes to commit."
          else
            git commit -m "Publish dev.betterlang ${RELEASE_VERSION}"
            git push origin master
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
